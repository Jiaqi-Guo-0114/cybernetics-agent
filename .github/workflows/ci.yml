name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12', '3.13']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pytest-cov

      - name: Run smoke tests
        run: |
          PYTHONPATH=src python3 -c "
          import cybernetics_agent
          from cybernetics_agent.core import FeedbackLoop, StabilityEngine, SystemIdentifier
          from cybernetics_agent.core import OptimalController, InfoFlow, AdaptiveTuner, HierarchyController
          from cybernetics_agent.adapters import HermesAdapter, LangChainAdapter, CrewAIAdapter
          from cybernetics_agent.adapters import AutoGenAdapter, NativeAdapter
          print('All imports successful')
          "

      - name: Run pytest with coverage
        run: |
          python -m pytest --version
          pip list | grep -i pytest
          PYTHONPATH=src python -m pytest tests/ -v --tb=long \
            --cov=src/cybernetics_agent \
            --cov-report=term-missing \
            --cov-fail-under=85 2>&1 | tee pytest-output.txt

      - name: Upload pytest output
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-output-${{ matrix.python-version }}
          path: pytest-output.txt

      - name: Upload coverage report
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/

      - name: Run ruff check
        run: ruff check src/ tests/

      - name: Run mypy
        run: mypy src/

  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build package
        run: python -m build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
