apiVersion: apps/v1
kind: Deployment
metadata:
  name: cybernetics-agent
  namespace: cybernetics
  labels:
    app: cybernetics-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cybernetics-agent
  template:
    metadata:
      labels:
        app: cybernetics-agent
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        fsGroup: 999
      containers:
        - name: agent
          image: cybernetics-agent:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: cybernetics-config
          env:
            - name: CYBERNETICS_STORAGE_PATH
              value: "/app/data"
          volumeMounts:
            - name: data
              mountPath: /app/data
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: data
          emptyDir: {}
